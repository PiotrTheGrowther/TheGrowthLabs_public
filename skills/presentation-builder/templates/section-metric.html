<section class="snap section-metric" data-section-type="metric">

    <div class="metric-label">{{LABEL_LINE}}</div>
    <p class="metric-context">{{CONTEXT_LINE}}</p>

</section>

  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -0.05em;
  color: var(--accent);
}
.section-metric .metric-label {
  font-family: var(--font-display);
  font-size: clamp(1.75rem, 4vw, 3.5rem);
  max-width: 22ch;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.section-metric .metric-context { color: rgba(244,240,232,0.6); max-width: 55ch; }
