<section class="snap section-timeline" data-section-type="timeline">
  <div class="container">
    <span class="kicker">{{KICKER_LABEL}}</span>
    <h2 class="timeline-title">{{TITLE}}</h2>
    <ol class="timeline-list">
      <li class="tl-entry">
        <div class="tl-date">{{DATE_1}}</div>
        <div class="tl-dot"></div>
        <div class="tl-content">
          <h3>{{EVENT_1_TITLE}}</h3>
          <p>{{EVENT_1_DETAIL}}</p>
        </div>
      </li>
      <li class="tl-entry">
        <div class="tl-date">{{DATE_2}}</div>
        <div class="tl-dot"></div>
        <div class="tl-content">
          <h3>{{EVENT_2_TITLE}}</h3>
          <p>{{EVENT_2_DETAIL}}</p>
        </div>
      </li>
      <li class="tl-entry">
        <div class="tl-date">{{DATE_3}}</div>
        <div class="tl-dot"></div>
        <div class="tl-content">
          <h3>{{EVENT_3_TITLE}}</h3>
          <p>{{EVENT_3_DETAIL}}</p>
        </div>
      </li>
    </ol>
  </div>
</section>

<style>
.section-timeline .timeline-title { max-width: 22ch; margin-bottom: var(--space-4); }
.section-timeline .timeline-list { list-style: none; display: grid; gap: var(--space-3); position: relative; }
.section-timeline .timeline-list::before {
  content: '';
  position: absolute;
  left: 9rem;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--line);
}
.section-timeline .tl-entry {
  display: grid;
  grid-template-columns: 8rem 1.5rem 1fr;
  gap: var(--space-2);
  align-items: start;
  padding: var(--space-2) 0;
}
.section-timeline .tl-date {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 0.5rem;
}
.section-timeline .tl-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 0.7rem;
  justify-self: center;
}
.section-timeline .tl-content h3 { font-size: clamp(1.25rem, 2.2vw, 1.75rem); margin-bottom: 0.25rem; }
.section-timeline .tl-content p { color: var(--muted); }
@media (max-width: 768px) {
  .section-timeline .timeline-list::before { left: 6px; }
  .section-timeline .tl-entry { grid-template-columns: 1.5rem 1fr; }
  .section-timeline .tl-date { grid-column: 1 / -1; padding-top: 0; }
  .section-timeline .tl-content { grid-column: 2; }
}
</style>
