<section class="snap section-comparison" data-section-type="comparison">
  <div class="container">
    <span class="kicker">{{KICKER_LABEL}}</span>
    <h2 class="cmp-title">{{TITLE}}</h2>
    <table class="cmp-table">
      <thead>
        <tr>
          <th>{{CRITERIA_LABEL}}</th>
          <th>{{COL_A}}</th>
          <th class="cmp-winner">{{COL_B}}</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>{{ROW_1_LABEL}}</td>
          <td>{{ROW_1_A}}</td>
          <td>{{ROW_1_B}}</td>
        </tr>
        <tr>
          <td>{{ROW_2_LABEL}}</td>
          <td>{{ROW_2_A}}</td>
          <td>{{ROW_2_B}}</td>
        </tr>
        <tr>
          <td>{{ROW_3_LABEL}}</td>
          <td>{{ROW_3_A}}</td>
          <td>{{ROW_3_B}}</td>
        </tr>
        <tr>
          <td>{{ROW_4_LABEL}}</td>
          <td>{{ROW_4_A}}</td>
          <td>{{ROW_4_B}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<style>
.section-comparison .cmp-title { max-width: 22ch; margin-bottom: var(--space-4); }
.section-comparison .cmp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: clamp(0.9rem, 1.4vw, 1.05rem);
}
.section-comparison .cmp-table th,
.section-comparison .cmp-table td {
  padding: var(--space-2) var(--space-2);
  text-align: left;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.section-comparison .cmp-table th {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-comparison .cmp-table th.cmp-winner { color: var(--accent); }
.section-comparison .cmp-table tbody tr:hover { background: rgba(0,0,0,0.02); }
.section-comparison .cmp-table td:first-child { font-weight: 500; }
.section-comparison .cmp-table td:last-child { color: var(--accent); font-weight: 500; }
@media (max-width: 640px) {
  .section-comparison .cmp-table th,
  .section-comparison .cmp-table td { padding: 0.5rem; font-size: 0.85rem; }
}
</style>
