<section class="snap section-hook" data-section-type="hook">
  <div class="hook-bg"></div>
  <div class="container hook-grid">
    <div class="hook-kicker">
      <span class="kicker">{{DECK_INDEX}}</span>
      <span class="kicker">{{DATE_OR_LABEL}}</span>
    </div>
    <h1 class="hook-headline">{{HEADLINE}}</h1>
    <p class="hook-sub">{{SUBLINE}}</p>
    <div class="hook-meta">
      <span class="kicker">scroll to continue</span>
      <span class="hook-arrow">↓</span>
    </div>
  </div>
</section>

<style>
.section-hook { padding-top: var(--space-8); padding-bottom: var(--space-6); }
.section-hook .hook-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(196,65,22,0.08), transparent 60%);
  pointer-events: none;
}
.section-hook .hook-grid { display: grid; gap: var(--space-4); }
.section-hook .hook-kicker { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: var(--space-2); }
.section-hook .hook-headline {
  font-size: clamp(3rem, 9vw, 8rem);
  font-weight: 300;
  letter-spacing: -0.04em;
  max-width: 18ch;
}
.section-hook .hook-headline em { font-style: italic; color: var(--accent); font-weight: 500; }
.section-hook .hook-sub { font-size: clamp(1rem, 1.5vw, 1.25rem); max-width: 55ch; color: var(--muted); }
.section-hook .hook-meta { display: flex; gap: var(--space-2); align-items: center; margin-top: var(--space-4); }
.section-hook .hook-arrow { font-size: 1.5rem; animation: hook-bounce 2s ease-in-out infinite; }
@keyframes hook-bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(8px);} }
</style>
