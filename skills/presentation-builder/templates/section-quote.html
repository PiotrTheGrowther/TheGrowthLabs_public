<section class="snap section-quote" data-section-type="quote">
  <div class="container quote-wrap">
    <div class="quote-mark" aria-hidden="true">"</div>
    <blockquote class="quote-body">
      {{QUOTE_TEXT}}
    </blockquote>
    <div class="quote-attr">
      <span class="quote-line"></span>
      <span>{{ATTRIBUTION}}</span>
    </div>
  </div>
</section>

<style>
.section-quote { background: var(--bg); }
.section-quote .quote-wrap { position: relative; max-width: 980px; margin: 0 auto; padding: 0 var(--space-2); }
.section-quote .quote-mark {
  font-family: var(--font-display);
  font-size: clamp(8rem, 18vw, 16rem);
  line-height: 0.7;
  color: var(--accent);
  position: absolute;
  top: -2rem;
  left: -1rem;
  opacity: 0.6;
  pointer-events: none;
}
.section-quote .quote-body {
  font-family: var(--font-display);
  font-size: clamp(1.75rem, 4.5vw, 3.75rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.15;
  letter-spacing: -0.02em;
  position: relative;
  z-index: 1;
}
.section-quote .quote-attr {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-4);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-quote .quote-line { display: inline-block; width: 4rem; height: 1px; background: var(--muted); }
</style>
